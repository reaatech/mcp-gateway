version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=debug
      - TENANT_CONFIG_DIR=/app/config/examples
    volumes:
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy

  mock-upstream:
    image: node:22-alpine
    working_dir: /app
    command: node mock-server.mjs
    ports:
      - '9090:9090'
    volumes:
      - ../config/mock-upstream:/app

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  redis-data:
