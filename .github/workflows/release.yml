name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'mcp-gateway/package-lock.json'
      - name: Install dependencies
        working-directory: mcp-gateway
        run: npm ci
      - name: Run tests
        working-directory: mcp-gateway
        run: npm test
      - name: Build
        working-directory: mcp-gateway
        run: npm run build
      - name: Publish to npm
        working-directory: mcp-gateway
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build and push Docker image
        working-directory: mcp-gateway
        run: |
          docker build -t mcp-gateway:${{ github.ref_name }} .
          docker tag mcp-gateway:${{ github.ref_name }} mcp-gateway:latest
      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > release-notes.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"* %s" >> release-notes.md
          cat release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            mcp-gateway/package.json
