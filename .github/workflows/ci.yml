name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts' '*.ts' '*.mjs'
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm test -- tests/integration/
      - name: Contract tests
        run: npm test -- tests/contract/
      - name: Security tests
        run: npm test -- tests/security/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mcp-gateway:test .
